x-backend-base: &backend-base
  build:
    context: ../backend
    dockerfile: Dockerfile
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "vistter.local:host-gateway"
  env_file:
    - ../.env
  environment:
    - DATABASE_URL=${DATABASE_URL:-sqlite:////data/vistterstream.db}
    - UPLOADS_DIR=${UPLOADS_DIR:-/data/uploads}
    - RTMP_RELAY_HOST=${RTMP_RELAY_HOST:-rtmp-relay}
    - RTMP_RELAY_PORT=${RTMP_RELAY_PORT:-1935}
    # CORS: Use vistter.local for mDNS hostname resolution (set hostname on Pi)
    # Override via CORS_ALLOW_ORIGINS in .env if needed
    - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://vistter.local:3000,http://localhost:3000}
    - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
    - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
    - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
    - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
    - TEMPEST_API_URL=${TEMPEST_API_URL:-http://host.docker.internal:8036}
  volumes:
    - vistter_data:/data
  # Expose GPU for hardware-accelerated encoding (Intel VA-API / QSV)
  devices:
    - /dev/dri:/dev/dri
  group_add:
    - "993"  # render group for GPU access
  depends_on:
    - rtmp-relay
  restart: unless-stopped

services:
  backend:
    <<: *backend-base
    container_name: vistterstream-backend
    ports:
      - "8000:8000"
    networks:
      - vistter-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '3.0'

  backend-host:
    <<: *backend-base
    container_name: vistterstream-backend-host
    profiles:
      - pi-host
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/vistterstream.db}
      - UPLOADS_DIR=${UPLOADS_DIR:-/data/uploads}
      - RTMP_RELAY_HOST=${PI_RTMP_HOST:-127.0.0.1}
      - RTMP_RELAY_PORT=${RTMP_RELAY_PORT:-1935}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}

  rtmp-relay:
    build: ./nginx-rtmp
    container_name: vistterstream-rtmp-relay
    ports:
      - "1935:1935"
      - "8081:8080"
    restart: unless-stopped
    networks:
      - vistter-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  preview-server:
    image: bluenviron/mediamtx:latest
    container_name: vistterstream-preview
    ports:
      - "1936:1935"
      - "8888:8888"
      - "9997:9997"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped
    networks:
      - vistter-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Optional: Set REACT_APP_API_URL in .env to override auto-detection
        # If not set, the frontend will auto-detect from browser location
        # Recommended: Use http://vistter.local:8000/api with mDNS hostname
        # For Cloudflare Tunnel, leave unset to use relative URLs (auto-detects HTTPS)
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    container_name: vistterstream-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - vistter-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Cloudflare Tunnel - enables remote access without port forwarding
  # See docs/CLOUDFLARE_TUNNEL_SETUP.md for setup instructions
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vistterstream-cloudflared
    env_file:
      - ../.env
    # Cloudflared automatically reads TUNNEL_TOKEN from env_file
    # TUNNEL_TOKEN must be set in .env file (can be same value as CLOUDFLARE_TUNNEL_TOKEN)
    command: tunnel run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - cloudflared_creds:/etc/cloudflared
    restart: unless-stopped
    networks:
      - vistter-net
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # TempestWeather - weather overlay and data API for Tempest weather stations
  # Requires network_mode: host for UDP broadcast reception (port 50222)
  # Enable with: docker compose --profile weather -f docker/docker-compose.rpi.yml up -d
  tempest-weather:
    build:
      context: ${TEMPEST_WEATHER_PATH:-../../TempestWeather}
      dockerfile: Dockerfile
    container_name: vistterstream-tempest-weather
    profiles:
      - weather
    network_mode: host
    env_file:
      - ../.env
    environment:
      - FLASK_PORT=${TEMPEST_FLASK_PORT:-8036}
      - TEMPEST_API_KEY=${TEMPEST_API_KEY:-}
      - TEMPEST_STATION_ID=${TEMPEST_STATION_ID:-}
      - TEMPEST_LOCATION_STATE=${TEMPEST_LOCATION_STATE:-}
      - TZ=America/New_York
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${TEMPEST_FLASK_PORT:-8036}/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vistter_data:
  cloudflared_creds:

networks:
  vistter-net:
    driver: bridge

